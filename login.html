<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ScamBandhKaro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; background: var(--bg-darker); }
    .auth-card { width: 100%; max-width: 420px; background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius); padding: 2.5rem; }
    .auth-logo { text-align: center; margin-bottom: 2rem; }
    .auth-logo .logo-big { width: 56px; height: 56px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 14px; display: inline-flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 0.75rem; }
    .auth-logo h2 { margin-bottom: 0.25rem; }
    .auth-logo p { font-size: 0.9rem; }
    .divider-text { display: flex; align-items: center; gap: 1rem; margin: 1.25rem 0; color: var(--text-muted); font-size: 0.85rem; }
    .divider-text::before, .divider-text::after { content:''; flex:1; height:1px; background:var(--border-light); }
    .social-btn { width: 100%; padding: 11px; background: var(--bg-darker); border: 1.5px solid var(--border-light); border-radius: var(--radius-sm); color: var(--text-secondary); font-size: 0.92rem; font-family: inherit; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-bottom: 0.75rem; }
    .social-btn:hover { border-color: var(--text-muted); color: var(--text-primary); }
    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.88rem; color: var(--text-muted); }
    .password-wrap { position: relative; }
    .password-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.1rem; }
    .form-hint { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; }
  </style>
</head>
<body>

<div class="auth-page">
  <div>
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-big"><i class="fa-solid fa-shield-halved" style="font-size:1.5rem;color:#fff;"></i></div>
        <h2>Welcome Back</h2>
        <p>Sign in to your ScamBandhKaro account</p>
      </div>

      <button class="social-btn" id="googleSignInBtn" onclick="handleGoogleSignIn()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="divider-text">or sign in with email</div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" id="loginEmail" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="password-wrap">
            <input type="password" class="form-control" id="loginPassword" placeholder="Your password" required autocomplete="current-password">
            <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)"><i class="fa-solid fa-eye"></i></button>
          </div>
          <div style="text-align:right;margin-top:4px;">
            <a href="#" style="font-size:0.82rem;" onclick="showToast('Password reset coming soon!')">Forgot password?</a>
          </div>
        </div>

        <label class="checkbox-opt" style="margin-bottom:1rem;">
          <input type="checkbox" id="rememberMe" style="accent-color:var(--primary);"> Remember me for 30 days
        </label>

        <button type="submit" class="btn btn-primary btn-lg w-full" id="loginBtn">Sign In</button>
      </form>

      <div id="loginError" class="hidden" style="margin-top:1rem;padding:0.75rem;background:rgba(239,68,68,0.1);border:1px solid var(--danger);border-radius:var(--radius-sm);color:var(--danger);font-size:0.88rem;text-align:center;"></div>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html" style="font-weight:600;">Sign up free →</a>
      </div>
    </div>

    <div style="text-align:center;margin-top:1.25rem;">
      <a href="index.html" style="font-size:0.85rem;color:var(--text-muted);">← Back to ScamBandhKaro</a>
    </div>
  </div>
</div>

<div id="toastContainer"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
  // If already signed in → redirect home
  firebase.auth().onAuthStateChanged(function(user) {
    if (user) window.location.href = 'index.html';
  });

  // ── Google Sign-In ─────────────────────────────────────────────
  function handleGoogleSignIn() {
    const btn = document.getElementById('googleSignInBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing in...';

    fbAuth.signInWithPopup(window.googleProvider)
      .then(function() {
        window.location.href = 'index.html';
      })
      .catch(function(err) {
        btn.disabled = false;
        btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg> Continue with Google`;
        showError(err.message || 'Google sign-in failed. Please try again.');
      });
  }

  // ── Email / Password Sign-In ───────────────────────────────────
  function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.textContent = 'Signing in...';
    btn.disabled = true;

    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    fbAuth.signInWithEmailAndPassword(email, password)
      .then(function() {
        window.location.href = 'index.html';
      })
      .catch(function(err) {
        btn.textContent = 'Sign In';
        btn.disabled = false;
        const msgs = {
          'auth/user-not-found':  'No account found with this email. Please sign up first.',
          'auth/wrong-password':  'Incorrect password. Please try again.',
          'auth/invalid-email':   'Invalid email address.',
          'auth/too-many-requests': 'Too many attempts. Please wait a minute and try again.'
        };
        showError(msgs[err.code] || err.message);
      });
  }

  function showError(msg) {
    const err = document.getElementById('loginError');
    err.classList.remove('hidden');
    err.textContent = msg;
  }

  function togglePassword(id, btn) {
    const inp = document.getElementById(id);
    if (inp.type === 'password') { inp.type = 'text'; btn.innerHTML = '<i class="fa-solid fa-eye-slash"></i>'; }
    else { inp.type = 'password'; btn.innerHTML = '<i class="fa-solid fa-eye"></i>'; }
  }

  function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3200);
  }
</script>
</body>
</html>
